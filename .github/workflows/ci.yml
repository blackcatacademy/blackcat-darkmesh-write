name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua 5.4
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Preflight (schemas + Lua syntax + fixtures)
        env:
          RUN_BATCH: 1
          RUN_DEPS_CHECK: 1
        run: scripts/verify/preflight.sh

      - name: Secret scan (gitleaks if available)
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            gitleaks detect --no-git -v
          else
            echo "gitleaks not installed; skipping"
          fi
